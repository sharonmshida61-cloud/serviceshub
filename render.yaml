services:
  - type: web
    name: localservices-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run prisma:generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: API_BASE_URL
        sync: false

  - type: static
    name: localservices-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://localservices-backend.onrender.com/api

services:
  # PostgreSQL Database
  - type: pserv
    name: localservices-db
    env: docker
    plan: free
    ipAllowList: []

  # Backend API
  - type: web
    name: localservices-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma migrate deploy && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: localservices-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: API_BASE_URL
        fromService:
          type: web
          name: localservices-backend
          property: host
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: localservices-frontend
          property: host

  # Frontend Static Site
  - type: web
    name: localservices-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: localservices-backend
          property: host

databases:
  - name: localservices-db
    databaseName: localservices
    user: localservices
    plan: free

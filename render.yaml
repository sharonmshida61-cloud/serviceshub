databases:
  # PostgreSQL Database
  - name: localservices-db
    databaseName: localservices
    user: localservices_user

services:
  # Backend API
  - type: web
    name: localservices-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: localservices-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://localservices-frontend.onrender.com
      - key: API_BASE_URL
        value: https://localservices-backend.onrender.com

  # Frontend Static Site
  - type: web
    name: localservices-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://localservices-backend.onrender.com/api
